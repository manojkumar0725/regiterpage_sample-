<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - உள்நுழையுங்கள்</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-circle">
        <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
      </div>
      <h1>உள்நுழையுங்கள்</h1>
      <p>உங்கள் account-ல் login செய்யுங்கள்</p>
    </div>

    <!-- Alert -->
    {% if error %}
    <div class="alert alert-error">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form action="/loginaction" method="POST" novalidate>

      <!-- User ID -->
      <div class="form-group">
        <label for="userid">User ID *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </span>
          <input type="text" id="userid" name="userid" placeholder="உங்கள் user id உள்ளிடவும்" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="password உள்ளிடவும்" required>
          <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <div class="switch-text">
      புதிய account வேணுமா? <a href="/register">இங்கே பதிவு செய்யுங்கள்</a>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
