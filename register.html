<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - பதிவு செய்யுங்கள்</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <div class="logo-circle">
        <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
      </div>
      <h1>பதிவு செய்யுங்கள்</h1>
      <p>புதிய account உருவாக்கவும்</p>
    </div>

    <!-- Alerts -->
    {% if error %}
    <div class="alert alert-error">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
      {{ success }}
    </div>
    {% endif %}

    <!-- Form -->
    <form action="/registeraction" method="POST" novalidate>

      <!-- Name -->
      <div class="form-group">
        <label for="name">முழு பெயர் *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </span>
          <input type="text" id="name" name="name" placeholder="உங்கள் பெயரை உள்ளிடவும்" required>
        </div>
      </div>

      <!-- User ID -->
      <div class="form-group">
        <label for="userid">User ID *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
            </svg>
          </span>
          <input type="text" id="userid" name="userid" placeholder="unique user id தேர்ந்தெடுக்கவும்" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="password உள்ளிடவும்" required>
          <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
            <svg id="eye-reg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile -->
      <div class="form-group">
        <label for="mobile">Mobile Number *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="5" y="2" width="14" height="20" rx="2"/>
              <circle cx="12" cy="18" r="1"/>
            </svg>
          </span>
          <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number"
                 maxlength="10" pattern="[0-9]{10}" required>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email ID *</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">பதிவு செய்யுங்கள்</button>
    </form>

    <div class="switch-text">
      ஏற்கனவே account இருக்கா? <a href="/login">Login பண்ணுங்க</a>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
